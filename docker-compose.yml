version: '3.8'

services:
  validador:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: validador
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=development

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    restart: unless-stopped
